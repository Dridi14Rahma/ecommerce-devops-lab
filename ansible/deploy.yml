---
- name: Deploy E-Commerce App
  hosts: web
  become: yes
  gather_facts: no

  vars:
    ansible_user: ec2-user

  pre_tasks:
    - name: Wait for SSH to be available
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        delay: 30
        timeout: 600
      vars:
        ansible_connection: local

  tasks:
    - name: Install system dependencies and Docker
      raw: |
        sudo yum install -y git curl wget yum-utils docker || exit 1
        sudo systemctl enable docker
        sudo systemctl start docker
        sudo usermod -aG docker ec2-user
      changed_when: false

    - name: Wait for Docker to be ready
      raw: |
        for i in $(seq 1 30); do
          if sudo docker info >/dev/null 2>&1; then
            exit 0
          fi
          sleep 5
        done
        exit 1
      changed_when: false

    - name: Install Docker Compose
      raw: |
        if ! command -v docker-compose >/dev/null 2>&1; then
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose && sudo chmod +x /usr/local/bin/docker-compose
        fi
      changed_when: false

    - name: Clone application repository
      raw: |
        if [ ! -d /home/ec2-user/app/.git ]; then
          rm -rf /home/ec2-user/app
          git clone --depth 1 https://github.com/Dridi14Rahma/ecommerce-devops-lab.git /home/ec2-user/app
        else
          cd /home/ec2-user/app && git fetch origin main && git reset --hard origin/main
        fi
        sudo chown -R ec2-user:ec2-user /home/ec2-user/app
      changed_when: false

    - name: Start containers
      raw: |
        cd /home/ec2-user/app/ansible
        docker-compose up -d
      changed_when: false

    - name: Wait for application
      raw: |
        for i in $(seq 1 20); do
          if curl -fsS http://127.0.0.1 >/dev/null 2>&1; then
            exit 0
          fi
          sleep 10
        done
        exit 1
      changed_when: false

    - name: Deployment status
      raw: echo "Application deployed on {{ inventory_hostname }}"
      changed_when: false
