---
- name: Deploy E-Commerce App
  hosts: web
  become: yes
  gather_facts: no
  
  # NE PAS utiliser Python 3.11 au démarrage - utiliser le défaut!
  # Python 3.11 sera disponible après le user_data Terraform

  pre_tasks:
    - name: Wait for SSH port to be available
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        delay: 30
        timeout: 600
      vars:
        ansible_connection: local
        ansible_python_interpreter: auto_legacy_group_vars

    - name: Check if Python 3.11 is available
      raw: which python3.11
      register: python311_check
      ignore_errors: yes
      retries: 30
      delay: 10
      until: python311_check.rc == 0

    - name: Ensure Python 3.11 is installed (if not found)
      raw: |
        if ! which python3.11 >/dev/null 2>&1; then
          sudo yum update -y
          sudo yum install -y python3.11
        fi
      when: python311_check.rc != 0

    - name: Set Python interpreter to 3.11
      set_fact:
        ansible_python_interpreter: /usr/bin/python3.11

  vars:
    ansible_user: ec2-user

  tasks:

    - name: Install Python 3.11 (attempt 1 - yum)
      raw: yum install -y python3.11
      retries: 5
      delay: 10
      ignore_errors: yes

    - name: Install Python 3.11 (attempt 2 - amazon-linux-extras)
      raw: amazon-linux-extras install -y python3.11
      retries: 3
      delay: 5
      ignore_errors: yes

    - name: Verify Python 3.11 is available
      raw: which python3.11 && echo "Python 3.11 found" || echo "Python 3.11 NOT found, will use default"
      register: python_verify
      ignore_errors: yes

    - name: Set Python interpreter to 3.11 if available
      set_fact:
        ansible_python_interpreter: /usr/bin/python3.11
      when: python_verify.rc == 0

    - name: Gather Facts
      setup:

    - name: Install system dependencies
      yum:
        name:
          - git
          - curl
          - wget
          - yum-utils
        state: present
      retries: 3
      delay: 10

    - name: Install Docker repository
      shell: yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      ignore_errors: yes
      retries: 2
      delay: 10

    - name: Install Docker
      yum:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
      retries: 3
      delay: 10
      ignore_errors: yes

    - name: Install Docker from amazon-linux (fallback)
      yum:
        name: docker
        state: present
      retries: 2
      delay: 5
      ignore_errors: yes

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes
      retries: 3
      delay: 5

    - name: Verify Docker is running
      command: docker ps
      retries: 5
      delay: 10
      register: docker_verify
      until: docker_verify.rc == 0

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes
      retries: 2
      delay: 5

    - name: Install Docker Compose from GitHub
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-Linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: "0755"
      retries: 3
      delay: 10
      ignore_errors: yes

    - name: Install Docker Compose fallback (v2.20.0)
      get_url:
        url: https://github.com/docker/compose/releases/download/v2.20.0/docker-compose-Linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: "0755"
      retries: 2
      delay: 5
      when: "'docker-compose' not in lookup('pipe', 'which docker-compose || echo missing')"
      ignore_errors: yes

    - name: Verify Docker Compose is installed
      command: docker-compose --version
      retries: 3
      delay: 5
      register: compose_verify
      ignore_errors: yes

    - name: Create app directory
      file:
        path: /home/ec2-user/app
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Copy docker-compose file
      copy:
        src: docker-compose.yml
        dest: /home/ec2-user/app/docker-compose.yml
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Copy nginx config
      copy:
        src: nginx.conf
        dest: /home/ec2-user/app/nginx.conf
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Copy server files
      copy:
        src: server/
        dest: /home/ec2-user/app/server/
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Reset SSH connection to apply docker group changes
      meta: reset_connection

    - name: Run containers
      shell: |
        cd /home/ec2-user/app
        docker-compose up -d
      become_user: ec2-user
      environment:
        PATH: "{{ ansible_env.PATH }}"
      retries: 5
      delay: 10
      register: compose_result
      until: compose_result.rc == 0

    - name: Wait for containers to start
      pause:
        seconds: 30

    - name: Wait for application to be ready
      uri:
        url: "http://localhost"
        status_code: 200
      retries: 10
      delay: 10
      register: result
      until: result.status == 200
      ignore_errors: yes

    - name: Display deployment status
      debug:
        msg: "Application deployed successfully on {{ inventory_hostname }}"
