---
- name: Deploy App
  hosts: web
  become: yes

  tasks:

    - name: Update system
      yum:
        name: "*"
        state: latest

    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Install Docker Compose
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: "0755"

    - name: Create app folder
      file:
        path: /app
        state: directory

    - name: Copy files
      copy:
        src: "{{ item }}"
        dest: /app/
      loop:
        - docker-compose.yml
        - nginx.conf

    - name: Run containers
      shell: docker-compose -f /app/docker-compose.yml up -d
      become_user: ec2-user
