version: '3'
services:
  mongodb:
    image: mongo:4.4
    restart: always
    networks:
      - appnet

  app:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./server:/app
    command: sh -c "npm install && node server.js"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/shop
    depends_on:
      - mongodb
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - appnet

networks:
  appnet:
