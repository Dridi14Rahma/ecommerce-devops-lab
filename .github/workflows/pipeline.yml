name: Full DevOps Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Permet le déclenchement manuel

jobs:

  # ══════════════════════════════════════════
  # 1. TERRAFORM — Créer l'infrastructure AWS
  # ══════════════════════════════════════════
  terraform:
    name: 🏗️ Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}
      alb_dns: ${{ steps.export.outputs.alb_dns }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 📋 Terraform Init
        run: terraform init

      - name: ✅ Terraform Validate
        run: terraform validate

      - name: 📊 Terraform Plan
        run: terraform plan -out=tfplan

      - name: 🚀 Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: 📤 Export IPs and ALB DNS
        id: export
        run: |
          IPS=$(terraform output -json instance_public_ips | jq -r '.[]' | tr '\n' ',')
          ALB=$(terraform output -raw alb_dns_name)
          echo "instance_ips=$IPS" >> $GITHUB_OUTPUT
          echo "alb_dns=$ALB" >> $GITHUB_OUTPUT
          echo "✅ IPs: $IPS"
          echo "✅ ALB: $ALB"

  # ══════════════════════════════════════════
  # 2. ANSIBLE — Configurer les serveurs
  # ══════════════════════════════════════════
  ansible:
    name: ⚙️ Configure Servers
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 📦 Install Ansible & jq
        run: |
          sudo apt update -qq
          sudo apt install -y ansible jq

      - name: 🔑 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: 📝 Generate Ansible Inventory
        run: |
          echo "[web]" > inventory.ini
          for ip in $(echo "${{ needs.terraform.outputs.instance_ips }}" | tr ',' ' '); do
            if [ -n "$ip" ]; then
              echo "$ip ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory.ini
            fi
          done
          echo "📋 Inventory généré:"
          cat inventory.ini

      - name: ⏳ Wait for EC2 to be ready (60s)
        run: sleep 60

      - name: 🎭 Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini ansible/deploy.yml -v
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: 🌐 Show App URL
        run: |
          echo "════════════════════════════════════"
          echo "🎉 DÉPLOIEMENT TERMINÉ !"
          echo "🌐 App URL: http://${{ needs.terraform.outputs.alb_dns }}"
          echo "════════════════════════════════════"

  # ══════════════════════════════════════════
  # 3. DESTROY — Optionnel (manuel seulement)
  # ══════════════════════════════════════════
  destroy:
    name: 🗑️ Destroy Infrastructure
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v3
      - name: 🔑 Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - name: 💥 Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Test AWS
        run: aws sts get-caller-identity
