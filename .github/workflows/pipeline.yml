name: Full DevOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4                        # ✅ v3 → v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4  # ✅ v2 → v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false                       # ✅ évite les outputs corrompus

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Instance IPs
        id: export
        run: |
          IPS=$(terraform output -json instance_public_ips \
            | jq -r '.[]' | tr '\n' ',' | sed 's/,$//')
          echo "instance_ips=$IPS" >> $GITHUB_OUTPUT
          echo "IPs exported: $IPS"

  ansible:
    name: Configure Servers
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4                        # ✅ v3 → v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible jq

      - name: Setup SSH Key
        run: |
          printf "%s" "${{ secrets.EC2_KEY }}" | tr -d '\r' > key.pem
          chmod 600 key.pem

      - name: Generate Inventory             # ✅ ajout python_interpreter + ssh args
        run: |
          cat > inventory.ini << EOF
          [web]
          EOF
          for ip in $(echo "${{ needs.terraform.outputs.instance_ips }}" | tr ',' ' '); do
            echo "$ip ansible_user=ec2-user \
              ansible_ssh_private_key_file=key.pem \
              ansible_python_interpreter=/usr/bin/python3 \
              ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ConnectTimeout=30'" \
              >> inventory.ini
          done
          echo "Generated inventory:"
          cat inventory.ini

      - name: Create ansible.cfg             # ✅ nouveau — active pipelining
        run: |
          cat > ansible.cfg << EOF
          [defaults]
          host_key_checking = False
          interpreter_python = /usr/bin/python3
          stdout_callback = yaml
          timeout = 60

          [ssh_connection]
          pipelining = True
          ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o ConnectTimeout=30
          EOF

      - name: Wait for EC2 instances SSH     # ✅ nouveau — attend que SSH soit prêt
        run: |
          for ip in $(echo "${{ needs.terraform.outputs.instance_ips }}" | tr ',' ' '); do
            echo "Waiting for SSH on $ip..."
            timeout 120 bash -c "until ssh -i key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=5 \
              ec2-user@$ip 'echo OK' 2>/dev/null; \
              do sleep 5; done"
            echo "SSH ready on $ip"
          done

      - name: Verify Python3 on EC2          # ✅ nouveau — vérifie Python3
        run: |
          for ip in $(echo "${{ needs.terraform.outputs.instance_ips }}" | tr ',' ' '); do
            ssh -i key.pem \
              -o StrictHostKeyChecking=no \
              ec2-user@$ip \
              "python3 --version || sudo yum install -y python3"
          done

      - name: Run Ansible Playbook
        run: |
          ANSIBLE_CONFIG=ansible.cfg \
          ansible-playbook -i inventory.ini ansible/deploy.yml -vv
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_PIPELINING: "True"         # ✅ forcé aussi via env

  destroy:
    name: Destroy Infrastructure
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4             # ✅ v3 → v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4  # ✅ v2 → v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
