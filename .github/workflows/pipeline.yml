name: Full DevOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:

# ================================
# TERRAFORM
# ================================
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}
      load_balancer_dns: ${{ steps.export.outputs.load_balancer_dns }}

    steps:
      - uses: actions/checkout@v4

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Cleanup Orphaned AWS Resources
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          ../scripts/aws-cleanup-ecommerce-prod.ps1 -Region ${{ secrets.AWS_REGION }} -Execute

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - run: terraform init
      - run: terraform validate
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan

      - name: Export IPs
        id: export
        run: |
          IPS=$(terraform output -json instance_public_ips | jq -r '.[]' | tr '\n' ',')
          LB_DNS=$(terraform output -raw load_balancer_dns_name | tr -d '\r')
          if [ -z "$LB_DNS" ]; then
            echo "Load balancer DNS output is empty" >&2
            exit 1
          fi
          echo "instance_ips=$IPS" >> $GITHUB_OUTPUT
          echo "load_balancer_dns=$LB_DNS" >> $GITHUB_OUTPUT
          printf '%s' "$LB_DNS" > load_balancer_dns.txt

      - name: Upload Load Balancer DNS
        uses: actions/upload-artifact@v4
        with:
          name: infra-details
          path: terraform/load_balancer_dns.txt
          if-no-files-found: error


# ================================
# ANSIBLE
# ================================
  ansible:
    name: Configure Servers
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Download Infra Details
        uses: actions/download-artifact@v4
        with:
          name: infra-details
          path: .

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible jq

      - name: SSH Key
        run: |
          printf "%s" "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Inventory
        run: |
          echo "[web]" > inventory.ini
          for ip in $(echo "${{ needs.terraform.outputs.instance_ips }}" | tr ',' ' '); do
            echo "$ip ansible_user=ec2-user ansible_ssh_private_key_file=key.pem" >> inventory.ini
          done

      - name: Wait SSH
        run: sleep 60

      - name: Run Ansible
        run: ansible-playbook -i inventory.ini ansible/deploy.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Verify Application Through Load Balancer
        run: |
          LB_DNS=$(tr -d '\r\n' < load_balancer_dns.txt)
          if [ -z "$LB_DNS" ]; then
            echo "Load balancer DNS file is empty" >&2
            exit 1
          fi
          for i in $(seq 1 20); do
            if curl -fsS "http://$LB_DNS"; then
              exit 0
            fi
            sleep 15
          done
          exit 1
